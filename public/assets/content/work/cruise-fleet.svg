<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 650" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f4f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d9e2ec;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pmsGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3c72" />
      <stop offset="100%" style="stop-color:#2a5298" />
    </linearGradient>
    <linearGradient id="integGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e96443" />
      <stop offset="100%" style="stop-color:#904e95" />
    </linearGradient>
    <linearGradient id="legacyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#434343" />
      <stop offset="100%" style="stop-color:#000000" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5a6c7e" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="650" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" font-size="20" font-weight="bold" fill="#1e2a3a">Cruise Line PMS Rollout – Integration Architecture (2012)</text>
  <line x1="200" y1="50" x2="700" y2="50" stroke="#2a5298" stroke-width="2" opacity="0.5"/>

  <!-- ====== LEFT: FLEET (30+ SHIPS) ====== -->
  <rect x="30" y="80" width="220" height="240" rx="10" fill="#e6f7ff" stroke="#1890ff" stroke-width="2" filter="url(#shadow)"/>
  <text x="140" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="#0050b3">🚢 Fleet – 30+ Ships</text>
  <line x1="50" y1="120" x2="230" y2="120" stroke="#1890ff" stroke-width="1" opacity="0.4"/>

  <!-- Ship icons -->
  <g transform="translate(60,140)">
    <rect x="0" y="5" width="40" height="15" rx="2" fill="#5dade2"/>
    <polygon points="20,-5 30,5 10,5" fill="#2c3e50"/>
    <text x="20" y="33" text-anchor="middle" font-size="9" fill="#333">Ship 1</text>
  </g>
  <g transform="translate(130,140)">
    <rect x="0" y="5" width="40" height="15" rx="2" fill="#5dade2"/>
    <polygon points="20,-5 30,5 10,5" fill="#2c3e50"/>
    <text x="20" y="33" text-anchor="middle" font-size="9" fill="#333">Ship 2</text>
  </g>
  <g transform="translate(60,190)">
    <rect x="0" y="5" width="40" height="15" rx="2" fill="#5dade2"/>
    <polygon points="20,-5 30,5 10,5" fill="#2c3e50"/>
    <text x="20" y="33" text-anchor="middle" font-size="9" fill="#333">Ship 3</text>
  </g>
  <g transform="translate(130,190)">
    <rect x="0" y="5" width="40" height="15" rx="2" fill="#5dade2"/>
    <polygon points="20,-5 30,5 10,5" fill="#2c3e50"/>
    <text x="20" y="33" text-anchor="middle" font-size="9" fill="#333">...</text>
  </g>
  <text x="140" y="275" text-anchor="middle" font-size="11" fill="#0050b3" font-style="italic">30+ vessels across global itineraries</text>

  <!-- ====== CENTER TOP: NEW PMS ====== -->
  <rect x="320" y="80" width="260" height="90" rx="12" fill="url(#pmsGrad)" filter="url(#shadow)"/>
  <text x="450" y="110" text-anchor="middle" font-size="16" font-weight="bold" fill="#ffffff">🏨 New Property Management System (PMS)</text>
  <text x="450" y="135" text-anchor="middle" font-size="11" fill="#b8d4ff">Reservations ∙ Housekeeping ∙ Dining</text>
  <text x="450" y="155" text-anchor="middle" font-size="11" fill="#b8d4ff">Billing ∙ Customs Reporting</text>

  <!-- ====== CENTER MID: INTEGRATION LAYER (YOUR ROLE) ====== -->
  <rect x="320" y="210" width="260" height="120" rx="12" fill="url(#integGrad)" filter="url(#shadow)" stroke="#c0392b" stroke-width="2"/>
  <text x="450" y="240" text-anchor="middle" font-size="15" font-weight="bold" fill="#fff">⚙️ Integration Layer</text>
  <text x="450" y="262" text-anchor="middle" font-size="12" fill="#ffe0b3">Architect &amp; Lead Developer</text>
  <line x1="340" y1="272" x2="560" y2="272" stroke="#fff" stroke-width="1" opacity="0.4"/>
  <text x="450" y="292" text-anchor="middle" font-size="10" fill="#fff">Real-time sync · Message bus · API gateway</text>
  <text x="450" y="312" text-anchor="middle" font-size="10" fill="#fff">Transaction logging · Fleet-wide orchestration</text>

  <!-- ====== RIGHT: LEGACY SYSTEMS ====== -->
  <rect x="650" y="80" width="220" height="290" rx="10" fill="#fafafa" stroke="#8c8c8c" stroke-width="2" filter="url(#shadow)"/>
  <text x="760" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="#262626">🗄️ Existing Infrastructure</text>
  <line x1="670" y1="120" x2="850" y2="120" stroke="#8c8c8c" stroke-width="1" opacity="0.4"/>

  <!-- AS/400 -->
  <rect x="675" y="140" width="170" height="55" rx="6" fill="#2c3e50"/>
  <text x="760" y="162" text-anchor="middle" font-size="12" font-weight="bold" fill="#ecf0f1">IBM AS/400</text>
  <text x="760" y="180" text-anchor="middle" font-size="10" fill="#bdc3c7">JD Edwards (ERP)</text>
  <text x="760" y="192" text-anchor="middle" font-size="9" fill="#95a5a6">Financials, Inventory, HR</text>

  <!-- Dynamics CRM -->
  <rect x="675" y="210" width="170" height="55" rx="6" fill="#2e7d64"/>
  <text x="760" y="232" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">Microsoft Dynamics CRM</text>
  <text x="760" y="250" text-anchor="middle" font-size="10" fill="#d7f0e6">Guest profiles, Loyalty, Marketing</text>

  <!-- GIS Customs -->
  <rect x="675" y="280" width="170" height="55" rx="6" fill="#7d5d42"/>
  <text x="760" y="302" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">GIS-based Customs</text>
  <text x="760" y="320" text-anchor="middle" font-size="10" fill="#f7e2c0">CBP manifest, Port clearance</text>

  <!-- ====== CONNECTIONS (Arrows) ====== -->
  <!-- Fleet to PMS -->
  <line x1="250" y1="125" x2="320" y2="125" stroke="#5a6c7e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="285" y="118" text-anchor="middle" font-size="9" fill="#444">ship ops</text>

  <!-- PMS to Integration -->
  <line x1="450" y1="170" x2="450" y2="210" stroke="#2a5298" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="465" y="195" font-size="9" fill="#2a5298">triggers</text>

  <!-- Integration to Legacy Systems -->
  <line x1="580" y1="250" x2="650" y2="170" stroke="#e96443" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="600" y="195" font-size="9" fill="#c0392b">JD Edwards</text>

  <line x1="580" y1="270" x2="650" y2="238" stroke="#e96443" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="600" y="258" font-size="9" fill="#c0392b">CRM</text>

  <line x1="580" y1="290" x2="650" y2="305" stroke="#e96443" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="610" y="303" font-size="9" fill="#c0392b">Customs</text>

  <!-- ====== BOTTOM: MIRAMAR, FLORIDA HQ ====== -->
  <rect x="280" y="400" width="340" height="65" rx="10" fill="#1e3c72" filter="url(#shadow)"/>
  <text x="450" y="430" text-anchor="middle" font-size="15" font-weight="bold" fill="#fff">🏢 Cruise Line Headquarters – Miramar, Florida</text>
  <text x="450" y="452" text-anchor="middle" font-size="11" fill="#b8d4ff">Enterprise command center · Deployment orchestration · Centralized monitoring</text>

  <!-- Connection from HQ to Integration -->
  <line x1="450" y1="400" x2="450" y2="330" stroke="#2a5298" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrow)"/>

  <!-- ====== TIMESTAMP AND ROLE ====== -->
  <text x="450" y="510" text-anchor="middle" font-size="11" fill="#5a6c7e">📅 Late 2012 – Fleet-wide rollout across 30+ ships</text>

  <!-- Legend -->
  <rect x="250" y="540" width="400" height="85" rx="8" fill="#fff" stroke="#ccc" stroke-width="1" filter="url(#shadow)"/>
  <text x="450" y="562" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">Legend</text>
  <rect x="275" y="575" width="18" height="12" fill="#1e3c72" rx="2"/>
  <text x="300" y="586" font-size="10" fill="#333">New PMS</text>
  <rect x="390" y="575" width="18" height="12" fill="url(#integGrad)" rx="2"/>
  <text x="415" y="586" font-size="10" fill="#333">Integration Layer (your work)</text>
  <rect x="580" y="575" width="18" height="12" fill="#434343" rx="2"/>
  <text x="605" y="586" font-size="10" fill="#333">Legacy Systems</text>
  <line x1="275" y1="605" x2="320" y2="605" stroke="#5a6c7e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="330" y="608" font-size="10" fill="#333">Data flow</text>
  <line x1="430" y1="605" x2="475" y2="605" stroke="#2a5298" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="485" y="608" font-size="10" fill="#333">Orchestration</text>

  <!-- subtle footer -->
  <text x="450" y="640" text-anchor="middle" font-size="9" fill="#999">Architectural overview – Integration layer as the central nervous system of the fleet</text>
</svg>