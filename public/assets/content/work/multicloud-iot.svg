<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 800" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#eef2f9" />
      <stop offset="100%" style="stop-color:#d4dfed" />
    </linearGradient>
    <linearGradient id="edgeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3c72" />
      <stop offset="100%" style="stop-color:#2a5298" />
    </linearGradient>
    <linearGradient id="mqttGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7d3c98" />
      <stop offset="100%" style="stop-color:#a569bd" />
    </linearGradient>
    <linearGradient id="datalakeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#117a65" />
      <stop offset="100%" style="stop-color:#148f77" />
    </linearGradient>
    <linearGradient id="mlGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b03a2e" />
      <stop offset="100%" style="stop-color:#e74c3c" />
    </linearGradient>
    <!-- Cloud provider gradients -->
    <linearGradient id="azureGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0072c6" />
      <stop offset="100%" style="stop-color:#005a9e" />
    </linearGradient>
    <linearGradient id="awsGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9900" />
      <stop offset="100%" style="stop-color:#cc7a00" />
    </linearGradient>
    <linearGradient id="gcpGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4285f4" />
      <stop offset="100%" style="stop-color:#1a73e8" />
    </linearGradient>
    <linearGradient id="ibmGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#054ada" />
      <stop offset="100%" style="stop-color:#003cbf" />
    </linearGradient>
    <linearGradient id="alibabaGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6a00" />
      <stop offset="100%" style="stop-color:#e65c00" />
    </linearGradient>
    <!-- Shadow -->
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-opacity="0.15"/>
    </filter>
    <filter id="shadowLight" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
    <!-- Arrow markers -->
    <marker id="arrowDark" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2c3e50" />
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1e3c72" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="800" fill="url(#bgGrad)" rx="12"/>

  <!-- Title -->
  <text x="550" y="40" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a252f">Cloud Platform POCs for IoT, Big Data &amp; Machine Learning (Early 2017)</text>
  <line x1="250" y1="54" x2="850" y2="54" stroke="#1a5276" stroke-width="2" opacity="0.4"/>

  <!-- ====== LEFT: Edge & Messaging Layer ====== -->
  <!-- Edge device (Raspberry Pi) -->
  <rect x="40" y="90" width="240" height="130" rx="10" fill="url(#edgeGrad)" filter="url(#shadow)"/>
  <text x="160" y="120" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">🌍 Edge Computing</text>
  <text x="160" y="145" text-anchor="middle" font-size="12" fill="#b8d4ff">Raspberry Pi + LTE Module</text>
  <line x1="60" y1="158" x2="260" y2="158" stroke="#fff" stroke-width="1" opacity="0.3"/>
  <text x="160" y="180" text-anchor="middle" font-size="10" fill="#cde4fc">Sensor data ingestion</text>
  <text x="160" y="198" text-anchor="middle" font-size="10" fill="#cde4fc">Real‑time telemetry</text>
  <text x="160" y="216" text-anchor="middle" font-size="10" fill="#cde4fc">Cellular backhaul (4G LTE)</text>

  <!-- Message brokers (MQTT) -->
  <rect x="40" y="250" width="240" height="150" rx="10" fill="url(#mqttGrad)" filter="url(#shadow)"/>
  <text x="160" y="280" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">📨 Message Broker POCs</text>
  <text x="160" y="300" text-anchor="middle" font-size="11" fill="#e8daef">MQTT Protocol Evaluation</text>
  <line x1="60" y1="312" x2="260" y2="312" stroke="#fff" stroke-width="1" opacity="0.3"/>
  <text x="160" y="335" text-anchor="middle" font-size="11" fill="#f5eef8">Azure IoT Hub</text>
  <text x="160" y="355" text-anchor="middle" font-size="11" fill="#f5eef8">AWS IoT Core</text>
  <text x="160" y="375" text-anchor="middle" font-size="11" fill="#f5eef8">Adafruit IO</text>
  <text x="160" y="393" text-anchor="middle" font-size="10" fill="#d2b4de" font-style="italic">(Facebook MQTT also evaluated)</text>

  <!-- ====== CENTER TOP: Data Lake POC ====== -->
  <rect x="360" y="90" width="380" height="110" rx="12" fill="url(#datalakeGrad)" filter="url(#shadow)"/>
  <text x="550" y="120" text-anchor="middle" font-size="16" font-weight="bold" fill="#ffffff">🗄️ Big Data – Data Lake POC</text>
  <text x="550" y="145" text-anchor="middle" font-size="12" fill="#d5f5e3">Ingestion · Storage · Query · Schema‑on‑read</text>
  <line x1="390" y1="158" x2="710" y2="158" stroke="#fff" stroke-width="1" opacity="0.3"/>
  <text x="550" y="180" text-anchor="middle" font-size="11" fill="#e8f8f5">Azure Data Lake · AWS S3 + Athena · GCP BigQuery · IBM Cloud Object Storage · Alibaba MaxCompute</text>

  <!-- ====== CENTER BOTTOM: ML Pipeline POC ====== -->
  <rect x="360" y="230" width="380" height="120" rx="12" fill="url(#mlGrad)" filter="url(#shadow)"/>
  <text x="550" y="260" text-anchor="middle" font-size="16" font-weight="bold" fill="#ffffff">🤖 Machine Learning Pipeline POC</text>
  <text x="550" y="285" text-anchor="middle" font-size="12" fill="#fadbd8">Training · Deployment · Inferencing</text>
  <line x1="390" y1="298" x2="710" y2="298" stroke="#fff" stroke-width="1" opacity="0.3"/>
  <text x="550" y="320" text-anchor="middle" font-size="11" fill="#f9e0d9">Azure ML · AWS SageMaker (preview) · GCP AI Platform · IBM Watson · Alibaba PAI</text>
  <text x="550" y="340" text-anchor="middle" font-size="10" fill="#fadbd8">Identical use case: predictive maintenance from IoT telemetry</text>

  <!-- Arrows: Edge -> Message Brokers -> Data Lake -> ML -->
  <path d="M 280 160 L 360 160" stroke="#2c3e50" stroke-width="2" marker-end="url(#arrowDark)" fill="none"/>
  <path d="M 280 320 L 360 320" stroke="#2c3e50" stroke-width="2" marker-end="url(#arrowDark)" fill="none"/>
  <path d="M 550 200 L 550 230" stroke="#2c3e50" stroke-width="2" marker-end="url(#arrowDark)" fill="none"/>

  <!-- ====== RIGHT: Five Cloud Platforms ====== -->
  <rect x="790" y="90" width="270" height="260" rx="12" fill="#fff" stroke="#bdc3c7" stroke-width="2" filter="url(#shadow)"/>
  <text x="925" y="120" text-anchor="middle" font-size="14" font-weight="bold" fill="#2c3e50">☁️ Cloud Platforms Evaluated</text>
  <line x1="810" y1="132" x2="1040" y2="132" stroke="#bdc3c7" stroke-width="1" opacity="0.5"/>

  <!-- Azure -->
  <rect x="810" y="145" width="230" height="25" rx="4" fill="url(#azureGrad)"/>
  <text x="925" y="163" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">Microsoft Azure</text>

  <!-- AWS -->
  <rect x="810" y="180" width="230" height="25" rx="4" fill="url(#awsGrad)"/>
  <text x="925" y="198" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">Amazon Web Services (AWS)</text>

  <!-- GCP -->
  <rect x="810" y="215" width="230" height="25" rx="4" fill="url(#gcpGrad)"/>
  <text x="925" y="233" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">Google Cloud Platform (GCP)</text>

  <!-- IBM Bluemix -->
  <rect x="810" y="250" width="230" height="25" rx="4" fill="url(#ibmGrad)"/>
  <text x="925" y="268" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">IBM Bluemix (now IBM Cloud)</text>

  <!-- Alibaba Cloud -->
  <rect x="810" y="285" width="230" height="25" rx="4" fill="url(#alibabaGrad)"/>
  <text x="925" y="303" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">Alibaba Cloud</text>

  <!-- Score/decision indicator -->
  <rect x="810" y="320" width="230" height="25" rx="12" fill="#f39c12" opacity="0.9"/>
  <text x="925" y="338" text-anchor="middle" font-size="11" font-weight="bold" fill="#2c3e50">Comparative scoring &amp; strategic fit analysis</text>

  <!-- Arrows from clouds to the POCs (bidirectional evaluation) -->
  <line x1="790" y1="170" x2="740" y2="170" stroke="#ff9900" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowDark)"/>
  <line x1="790" y1="230" x2="740" y2="230" stroke="#4285f4" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowDark)"/>
  <line x1="790" y1="290" x2="740" y2="290" stroke="#2c3e50" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowDark)"/>

  <!-- ====== BOTTOM: Strategic Roadmap Output ====== -->
  <rect x="90" y="480" width="920" height="90" rx="14" fill="#1b2631" filter="url(#shadow)"/>
  <text x="550" y="512" text-anchor="middle" font-size="16" font-weight="bold" fill="#ffffff">📈 Strategic Cloud Adoption Roadmap (Your Recommendation)</text>
  <text x="550" y="540" text-anchor="middle" font-size="12" fill="#bdc3c7">Multi‑cloud strategy · Workload placement · Migration phases · Governance framework</text>
  <text x="550" y="560" text-anchor="middle" font-size="11" fill="#95a5a6">Identical POC use cases across all 5 platforms → apples‑to‑apples comparison</text>

  <!-- Arrow from POCs to strategic roadmap -->
  <line x1="550" y1="350" x2="550" y2="480" stroke="#1e3c72" stroke-width="2.5" marker-end="url(#arrowBlue)"/>

  <!-- ====== TIMESTAMP & ROLE ====== -->
  <text x="550" y="610" text-anchor="middle" font-size="12" fill="#5a6c7e">📅 Early 2017 – Comprehensive cloud POCs for IoT, Big Data, and ML workloads</text>

  <!-- Legend / Component badges -->
  <rect x="150" y="640" width="800" height="70" rx="10" fill="#f8f9fa" stroke="#ccc" stroke-width="1" filter="url(#shadowLight)"/>
  <text x="550" y="664" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">POC Components</text>
  <rect x="200" y="678" width="16" height="12" fill="url(#edgeGrad)" rx="2"/>
  <text x="222" y="690" font-size="10" fill="#333">Edge (RPi + LTE)</text>
  <rect x="360" y="678" width="16" height="12" fill="url(#mqttGrad)" rx="2"/>
  <text x="382" y="690" font-size="10" fill="#333">MQTT Brokers</text>
  <rect x="510" y="678" width="16" height="12" fill="url(#datalakeGrad)" rx="2"/>
  <text x="532" y="690" font-size="10" fill="#333">Data Lake</text>
  <rect x="640" y="678" width="16" height="12" fill="url(#mlGrad)" rx="2"/>
  <text x="662" y="690" font-size="10" fill="#333">ML Pipeline</text>
  <rect x="780" y="678" width="16" height="12" fill="#f39c12" rx="2"/>
  <text x="802" y="690" font-size="10" fill="#333">5‑Cloud Comparison</text>

  <!-- Small footer note for Facebook MQTT clarification -->
  <text x="550" y="735" text-anchor="middle" font-size="9" fill="#95a5a6">Note: MQTT evaluations included Azure IoT Hub, AWS IoT Core, Adafruit IO, and internal testing with Facebook's MQTT infrastructure.</text>
</svg>