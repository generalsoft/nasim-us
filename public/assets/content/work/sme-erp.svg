<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fa" />
      <stop offset="100%" style="stop-color:#e2e8f0" />
    </linearGradient>
    <linearGradient id="erpGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3c72" />
      <stop offset="100%" style="stop-color:#2a5298" />
    </linearGradient>
    <linearGradient id="moduleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2980b9" />
      <stop offset="100%" style="stop-color:#1f618d" />
    </linearGradient>
    <linearGradient id="budgetGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e74c3c" />
      <stop offset="100%" style="stop-color:#c0392b" />
    </linearGradient>
    <linearGradient id="successGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#27ae60" />
      <stop offset="100%" style="stop-color:#2ecc71" />
    </linearGradient>
    <!-- Shadows -->
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-opacity="0.15"/>
    </filter>
    <filter id="shadowLight" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
    <!-- Arrow markers -->
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2a5298" />
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#c0392b" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1000" height="700" fill="url(#bgGrad)" rx="12"/>

  <!-- Title -->
  <text x="500" y="40" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a252f">Custom ERP for Electronics Distribution SME – Built from Scratch (2009–2010)</text>
  <line x1="200" y1="54" x2="800" y2="54" stroke="#1e3c72" stroke-width="2" opacity="0.4"/>

  <!-- ====== TOP: Budget / Off-the-shelf problem ====== -->
  <rect x="60" y="80" width="400" height="85" rx="12" fill="#fdedec" stroke="url(#budgetGrad)" stroke-width="2" filter="url(#shadow)"/>
  <text x="260" y="108" text-anchor="middle" font-size="14" font-weight="bold" fill="#c0392b">⚠️ Off‑the‑shelf ERP – Too Expensive</text>
  <text x="260" y="130" text-anchor="middle" font-size="12" fill="#e74c3c">Enterprise pricing out of budget for SME</text>
  <text x="260" y="150" text-anchor="middle" font-size="11" fill="#7f8c8d">SAP, Oracle, Microsoft Dynamics – $100k+</text>

  <rect x="540" y="80" width="400" height="85" rx="12" fill="#e8f8f5" stroke="#27ae60" stroke-width="2" filter="url(#shadow)"/>
  <text x="740" y="108" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e8449">✅ Decision: Custom Built ERP</text>
  <text x="740" y="130" text-anchor="middle" font-size="12" fill="#27ae60">Full control · Pay for what you need</text>
  <text x="740" y="150" text-anchor="middle" font-size="11" fill="#7f8c8d">Tailored to electronics distribution</text>

  <!-- Arrow from left to right -->
  <line x1="460" y1="122" x2="540" y2="122" stroke="#c0392b" stroke-width="2.5" stroke-dasharray="6,3" marker-end="url(#arrowRed)"/>

  <!-- ====== CENTER: Custom ERP Platform (Your work) ====== -->
  <rect x="150" y="200" width="700" height="220" rx="16" fill="url(#erpGrad)" filter="url(#shadow)" stroke="#0b3d5c" stroke-width="3"/>
  <text x="500" y="235" text-anchor="middle" font-size="20" font-weight="bold" fill="#ffffff">🏭 Custom ERP System – Built from Scratch</text>
  <text x="500" y="262" text-anchor="middle" font-size="13" fill="#b8d4ff">Architect &amp; Lead Developer (Small Team)</text>
  <line x1="200" y1="278" x2="800" y2="278" stroke="#ffffff" stroke-width="1" opacity="0.4"/>

  <!-- Module grid -->
  <rect x="180" y="295" width="150" height="40" rx="6" fill="url(#moduleGrad)" filter="url(#shadowLight)"/>
  <text x="255" y="320" text-anchor="middle" font-size="12" fill="#fff">👥 Customer Management</text>

  <rect x="350" y="295" width="150" height="40" rx="6" fill="url(#moduleGrad)" filter="url(#shadowLight)"/>
  <text x="425" y="320" text-anchor="middle" font-size="12" fill="#fff">📦 Orders</text>

  <rect x="520" y="295" width="150" height="40" rx="6" fill="url(#moduleGrad)" filter="url(#shadowLight)"/>
  <text x="595" y="320" text-anchor="middle" font-size="12" fill="#fff">💰 Billing</text>

  <rect x="180" y="350" width="150" height="40" rx="6" fill="url(#moduleGrad)" filter="url(#shadowLight)"/>
  <text x="255" y="375" text-anchor="middle" font-size="12" fill="#fff">🏢 Vendor Management</text>

  <rect x="350" y="350" width="150" height="40" rx="6" fill="url(#moduleGrad)" filter="url(#shadowLight)"/>
  <text x="425" y="375" text-anchor="middle" font-size="12" fill="#fff">🏦 Treasury</text>

  <rect x="520" y="350" width="150" height="40" rx="6" fill="url(#moduleGrad)" filter="url(#shadowLight)"/>
  <text x="595" y="375" text-anchor="middle" font-size="12" fill="#fff">👔 HR</text>

  <rect x="350" y="405" width="300" height="40" rx="6" fill="url(#moduleGrad)" filter="url(#shadowLight)"/>
  <text x="500" y="430" text-anchor="middle" font-size="12" fill="#fff">🚚 Supply Chain (Warehousing, Logistics, Forecasting)</text>

  <!-- ====== LEFT/BOTTOM: Timeline ====== -->
  <rect x="60" y="470" width="380" height="95" rx="12" fill="#fff" stroke="#bdc3c7" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="250" y="498" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e3c72">📅 Project Timeline – 18 Months</text>
  <text x="250" y="522" text-anchor="middle" font-size="12" fill="#2c3e50">June 2009 → November 2010</text>
  <rect x="90" y="540" width="320" height="15" rx="7" fill="#2980b9"/>
  <text x="250" y="553" text-anchor="middle" font-size="10" fill="#fff">Design · Build · Test · Deploy</text>

  <!-- ====== RIGHT/BOTTOM: Team &amp; Role ====== -->
  <rect x="560" y="470" width="380" height="95" rx="12" fill="#fff" stroke="#2a5298" stroke-width="2" filter="url(#shadow)"/>
  <text x="750" y="498" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e3c72">👨‍💻 Your Role</text>
  <text x="750" y="522" text-anchor="middle" font-size="12" fill="#2c3e50">Sole Architect · Lead Developer</text>
  <text x="750" y="542" text-anchor="middle" font-size="11" fill="#7f8c8d">Small team leadership · Full SDLC ownership</text>

  <!-- Connecting lines -->
  <line x1="300" y1="420" x2="250" y2="470" stroke="#2a5298" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowBlue)"/>
  <line x1="700" y1="420" x2="750" y2="470" stroke="#2a5298" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowBlue)"/>

  <!-- ====== BOTTOM: Outcomes ====== -->
  <rect x="120" y="595" width="760" height="55" rx="12" fill="url(#successGrad)" filter="url(#shadow)"/>
  <text x="500" y="622" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">🎯 Key Outcomes – Fully Operational ERP for Electronics Distribution</text>
  <text x="500" y="642" text-anchor="middle" font-size="11" fill="#d5f5e3">Integrated CRM · Order-to-cash · Vendor management · Treasury · HR · Supply chain</text>

  <!-- Legend -->
  <rect x="220" y="665" width="560" height="30" rx="6" fill="#f8f9fa" stroke="#ccc" stroke-width="1"/>
  <text x="500" y="685" text-anchor="middle" font-size="10" fill="#333">SME = Small to Medium Enterprise · Built from scratch vs. off-the-shelf · Delivered on time &amp; within budget</text>
</svg>